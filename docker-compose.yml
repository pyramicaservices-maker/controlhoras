services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build:
      context: ./laravel-erp
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./laravel-erp:/app
      - /app/node_modules